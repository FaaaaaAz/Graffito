name: Deploy to Vercel

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: graffito/package-lock.json

      - name: Install dependencies
        working-directory: graffito
        run: npm ci

      - name: Run linter
        working-directory: graffito
        run: npm run lint
        continue-on-error: true

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # These three run from the repo root (not graffito/) because the
      # Vercel project's "Root Directory" setting is already "graffito" —
      # the CLI resolves that itself. Also cd-ing into graffito/ here
      # double-nests the path and breaks the CLI with "spawn sh ENOENT".
      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
