name: Deploy to Vercel

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: graffito/package-lock.json

      - name: Install dependencies
        working-directory: graffito
        run: npm ci

      - name: Run linter
        working-directory: graffito
        run: npm run lint
        continue-on-error: true

      # Pinned (not @latest): an unpinned version once resolved to a CLI
      # build with a flaky "spawn sh ENOENT" bug on this exact command
      # sequence. 55.0.0 is the version that produced a correct build
      # (all 10 routes) in earlier runs.
      - name: Install Vercel CLI
        run: npm install --global vercel@55.0.0

      # All three run from inside graffito/ now. The project's "Root
      # Directory" setting is cleared (empty) in Vercel — combining that
      # setting with CLI-triggered deploys from the repo root produced
      # "successful" deployments that 404'd on every route, in both the
      # remote-build and local-build+--prebuilt flows. Treating graffito/
      # as the CLI's own root directly (cd into it, no rootDirectory
      # concept at all) sidesteps that.
      - name: Pull Vercel environment information
        working-directory: graffito
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        working-directory: graffito
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        working-directory: graffito
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
