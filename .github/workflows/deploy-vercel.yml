name: Deploy to Vercel

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: graffito/package-lock.json

      - name: Install dependencies
        working-directory: graffito
        run: npm ci

      - name: Run linter
        working-directory: graffito
        run: npm run lint
        continue-on-error: true

      # Pinned (not @latest): an unpinned version once resolved to a CLI
      # build with a flaky "spawn sh ENOENT" bug on this exact command
      # sequence. 55.0.0 is the version that produced a correct build
      # (all 10 routes) in earlier runs.
      - name: Install Vercel CLI
        run: npm install --global vercel@55.0.0

      - name: Pull Vercel environment information
        working-directory: graffito
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # No local "vercel build" here: it runs in a degraded mode outside
      # Vercel's own infrastructure ("WARNING! Build not running on
      # Vercel...") and every local-build attempt produced a deployment
      # that reported success but 404'd on every route — the static
      # assets were there but no serverless function got registered to
      # actually serve the app. Letting Vercel build remotely (its
      # normal, fully-tested path) avoids that; graffito/ as cwd means
      # it uploads straight from the app's own root, no Root Directory
      # setting needed (already cleared on the project).
      - name: Deploy to Vercel
        working-directory: graffito
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
