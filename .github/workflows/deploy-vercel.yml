name: Deploy to Vercel

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: graffito/package-lock.json

      - name: Install dependencies
        working-directory: graffito
        run: npm ci

      - name: Run linter
        working-directory: graffito
        run: npm run lint
        continue-on-error: true

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Runs from the repo root (not graffito/) because the Vercel
      # project's "Root Directory" setting is already "graffito" — the
      # CLI resolves that itself.
      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # No local "vercel build" + "--prebuilt" step here on purpose: building
      # locally on the runner hit an intermittent "spawn sh ENOENT" bug in the
      # Vercel CLI. Letting Vercel build remotely (its normal, most-tested
      # path) sidesteps that entirely.
      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
