name: Deploy to Vercel

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: graffito/package-lock.json

      - name: Install dependencies
        working-directory: graffito
        run: npm ci

      - name: Run linter
        working-directory: graffito
        run: npm run lint
        continue-on-error: true

      # Pinned (not @latest): an unpinned version once resolved to a CLI
      # build with a flaky "spawn sh ENOENT" bug on this exact command
      # sequence. 55.0.0 is the version that produced a correct build
      # (all 10 routes) in earlier runs.
      - name: Install Vercel CLI
        run: npm install --global vercel@55.0.0

      # These run from the repo root (not graffito/) because the Vercel
      # project's "Root Directory" setting is already "graffito" — the
      # CLI resolves that itself, and building locally + uploading the
      # prebuilt output is the documented-reliable path for a project
      # whose app lives in a subfolder (plain "vercel deploy" without a
      # local build produced a build that looked fine but 404'd on every
      # route — a remote-build/rootDirectory interaction bug).
      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Diagnose pulled env file (no secrets printed)
        run: |
          FILE=".vercel/.env.production.local"
          if [ -f "$FILE" ]; then
            echo "File exists, $(wc -l < "$FILE") lines."
            grep -o '^[A-Z_]*=' "$FILE" | while read -r key; do
              name="${key%=}"
              len=$(grep "^${key}" "$FILE" | cut -d= -f2- | tr -d '\n' | wc -c)
              echo "$name -> value length: $len"
            done
          else
            echo "File does NOT exist at $FILE"
            find .vercel -type f 2>/dev/null
          fi

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
